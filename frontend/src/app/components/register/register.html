<div class="container mt-5" style="max-width: 400px;">
  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <h3 class="text-center mb-4">Creare Cont Nou</h3>
      
      <form (ngSubmit)="onRegister()" #registerForm="ngForm">
        <div class="mb-3">
          <label class="form-label">Nume Complet</label>
          <input type="text" class="form-control" name="fullName" 
                 [(ngModel)]="userData.FullName" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="email" 
                 [(ngModel)]="userData.Email" required>
        </div>
        
        <div class="mb-4">
          <label class="form-label">Parolă</label>
          <input type="password" class="form-control" name="password" 
                 [(ngModel)]="userData.Password" required minlength="6">
        </div>
        
        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-success">
            Înregistrare
          </button>
          <a routerLink="/login" class="btn btn-link text-decoration-none">Ai deja cont? Loghează-te</a>
        </div>
      </form>
    </div>
  </div>
</div>
